spring:
  profiles:
    active: "local"
  application:
    name: psycho-logger

  datasource:
    url: jdbc:mysql://localhost:3306/psychologger_app
    username: psychologger_user
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

security:
  jwt:
    secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000 # 1 day in milliseconds