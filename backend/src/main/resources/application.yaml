spring:
  application:
    name: psycho-logger

  datasource:
    url: jdbc:mysql://localhost:3306/psychologger_app
    username: psychologger_user
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080